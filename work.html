<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Arty Visuals</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0D0D0D; --void-soft: #141414; --void-mid: #1A1A1A; --void-lifted: #222222;
    --red: #D4420A; --teal: #0A7A5A; --violet: #5A0AD4;
    --white: #ffffff; --white70: rgba(255,255,255,0.7); --white40: rgba(255,255,255,0.4);
    --white15: rgba(255,255,255,0.15); --white08: rgba(255,255,255,0.08); --white04: rgba(255,255,255,0.04);
    --serif: 'Cormorant Garamond', Georgia, serif; --sans: 'Syne', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--void); color: var(--white); font-family: var(--sans); line-height: 1.6; overflow-x: hidden; }
  
  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 24px 60px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(13,13,13,0.95) 0%, transparent 100%); backdrop-filter: blur(2px); }
  .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--red); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white70); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--white); }
  .nav-cta { color: var(--red) !important; border: 1px solid var(--red); padding: 10px 22px; transition: all 0.25s !important; }
  .nav-cta:hover { background: var(--red) !important; color: var(--white) !important; }
  
  .menu-toggle { display: none; cursor: pointer; z-index: 101; }
  .menu-toggle i { font-size: 24px; color: var(--white); }

  /* WORK SECTION */
  .work-hero { padding: 160px 60px 80px; text-align: center; }
  .work-title { font-family: var(--serif); font-size: clamp(48px, 8vw, 80px); font-weight: 300; margin-bottom: 24px; }
  .work-title em { font-style: italic; color: var(--red); }
  
  .filter-bar { display: flex; justify-content: center; gap: 24px; margin-bottom: 60px; flex-wrap: wrap; }
  .filter-btn { background: none; border: none; color: var(--white40); font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: color 0.3s; padding-bottom: 6px; border-bottom: 1px solid transparent; }
  .filter-btn.active, .filter-btn:hover { color: var(--white); border-bottom: 1px solid var(--red); }

  .portfolio-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 0 60px 120px; }
  .portfolio-item { grid-column: span 4; position: relative; overflow: hidden; background: var(--void-soft); border: 1px solid var(--white04); transition: transform 0.4s ease; }
  .portfolio-item.wide { grid-column: span 8; }
  .portfolio-item.tall { grid-row: span 2; }
  .portfolio-item:hover { transform: translateY(-8px); border-color: var(--white15); }
  
  .portfolio-media { width: 100%; height: 100%; object-fit: cover; aspect-ratio: 4/5; display: block; }
  .wide .portfolio-media { aspect-ratio: 16/9; }
  .tall .portfolio-media { aspect-ratio: 4/7; }

  /* FOOTER */
  footer { padding: 80px 60px; border-top: 1px solid var(--white08); text-align: center; background: var(--void); }
  .footer-logo { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--white70); margin-bottom: 10px; }
  .footer-logo span { color: var(--red); }
  .footer-tagline { font-family: var(--serif); font-size: 14px; font-style: italic; color: var(--white40); margin-bottom: 40px; }

  /* MOBILE */
  @media (max-width: 900px) {
    nav { padding: 20px 24px; }
    .menu-toggle { display: block; }
    .nav-links {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      background: var(--void-mid);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transition: 0.4s ease-in-out;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .nav-links.active { right: 0; }
    .work-hero, .portfolio-grid, footer { padding: 100px 24px 40px !important; }
    .portfolio-grid { grid-template-columns: 1fr; }
    .portfolio-item, .portfolio-item.wide { grid-column: span 1; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Arty<span>.</span>Visuals</a>
  <div class="menu-toggle" id="mobile-menu">
    <i class="fas fa-bars"></i>
  </div>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="work.html" class="active">Work</a></li>
    <li><a href="founder.html">Founder</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="booking.html" class="nav-cta">Book Us</a></li>
  </ul>
</nav>

<section class="work-hero">
  <h1 class="work-title">Selected<br><em>Works.</em></h1>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterWork(this, 'all')">All Work</button>
    <button class="filter-btn" onclick="filterWork(this, 'photography')">Photography</button>
    <button class="filter-btn" onclick="filterWork(this, 'film')">Film & Motion</button>
    <button class="filter-btn" onclick="filterWork(this, 'branding')">Branding</button>
    <button class="filter-btn" onclick="filterWork(this, 'design')">Print & Design</button>
  </div>
</section>

<div class="portfolio-grid">
  <div class="portfolio-item wide" data-cat="photography">
    <img src="images/photography-1.jpg" alt="Photography" class="portfolio-media">
  </div>
  <div class="portfolio-item" data-cat="branding">
    <img src="images/branding-1.jpg" alt="Branding" class="portfolio-media">
  </div>
  <div class="portfolio-item tall" data-cat="film">
    <img src="images/film-1.jpg" alt="Film" class="portfolio-media">
  </div>
  <div class="portfolio-item" data-cat="design">
    <img src="images/design-1.jpg" alt="Design" class="portfolio-media">
  </div>
</div>

<footer>
  <div class="footer-logo">Arty<span>.</span>Visuals</div>
  <div class="footer-tagline">"Honest Art."</div>
  <div class="footer-copy">© 2026 Arty Visuals · Ian Kibet · Nairobi, Kenya</div>
</footer>

<script>
  const menuToggle = document.getElementById('mobile-menu');
  const navLinks = document.querySelector('.nav-links');

  menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    const icon = menuToggle.querySelector('i');
    icon.classList.toggle('fa-bars');
    icon.classList.toggle('fa-times');
  });

  function filterWork(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.portfolio-item').forEach(item => {
      item.style.display = (cat === 'all' || item.dataset.cat === cat) ? 'block' : 'none';
    });
  }
</script>
</body>
</html>
